<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#121212">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title data-i18n="title">简单拼图</title>
  <meta name="keywords" content="长图拼接,台词拼接,拼图工具,图片拼接,长图生成,离线应用,PWA,Image Stitcher,Long Image,Photo Joiner">

  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="bg-gray-50 text-gray-900 dark:bg-[#121212] dark:text-white">
  <div id="step-1" class="step-container active-step p-4 sm:p-6 w-full h-full flex flex-col">
    <div class="text-center mb-4 sm:mb-6 shrink-0">
      <h1 class="text-2xl sm:text-3xl font-bold mb-2" data-i18n="title">简单拼图</h1>
    </div>

    <div
      class="flex gap-4 mb-4 sm:mb-6 bg-white dark:bg-gray-800/50 p-2 rounded-full border border-gray-200 dark:border-gray-700 shrink-0 self-center">
      <label
        class="flex items-center gap-2 cursor-pointer px-4 py-2 rounded-full transition-colors hover:bg-gray-100 dark:hover:bg-gray-700">
        <input type="radio" name="direction" value="vertical" checked class="accent-blue-500">
        <span class="text-sm font-medium" data-i18n="vertical">纵向拼接</span>
      </label>
      <label
        class="flex items-center gap-2 cursor-pointer px-4 py-2 rounded-full transition-colors hover:bg-gray-100 dark:hover:bg-gray-700">
        <input type="radio" name="direction" value="horizontal" class="accent-blue-500">
        <span class="text-sm font-medium" data-i18n="horizontal">横向拼接</span>
      </label>
    </div>

    <div
      class="w-full flex-grow bg-white dark:bg-gray-900 border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-2xl flex flex-col relative transition-colors min-h-0 overflow-hidden cursor-pointer"
      id="drop-zone">
      <input type="file" id="file-input" multiple accept="image/*" class="hidden">
      <div id="image-grid"
        class="w-full h-full overflow-y-auto p-4 sm:p-6 content-start grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-8 gap-4 hidden relative z-10">
      </div>
      <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-0">
        <svg class="w-16 h-16 text-gray-400 dark:text-gray-600 mb-4" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <p class="text-gray-500 dark:text-gray-400 text-sm text-center"><span
            data-i18n="emptyTitle">点击或拖拽图片到此处</span><br><span data-i18n="emptySub">拖动缩略图可重新排序</span></p>
      </div>
    </div>

    <div class="mt-4 sm:mt-6 shrink-0 flex justify-center gap-4">
      <button id="btn-clear-all" class="btn btn-secondary px-8 py-3 text-lg opacity-50 cursor-not-allowed" disabled
        data-i18n="clear">清空</button>
      <button id="btn-next-1" class="btn btn-primary px-8 py-3 text-lg opacity-50 cursor-not-allowed" disabled
        data-i18n="nextStep">下一步</button>
    </div>
  </div>

  <div id="step-2-3" class="step-container hidden-step bg-gray-100 dark:bg-gray-950">
    <canvas id="main-canvas" class="w-full h-full block"></canvas>

    <div id="ui-step2-global" class="floating-panel hidden">
      <button class="btn btn-secondary" id="btn-global-prev" data-i18n="prevStep">上一步</button>
      <span class="text-xs sm:text-sm text-gray-500 dark:text-gray-300 mx-1 sm:mx-2 whitespace-nowrap"
        data-i18n="clickSeam">点击接缝微调</span>
      <button class="btn btn-primary" id="btn-global-next" data-i18n="nextStep">下一步</button>
    </div>

    <div id="ui-step2-seam" class="floating-panel hidden">
      <button class="btn btn-secondary" id="btn-seam-cancel" data-i18n="cancel">取消</button>
      <label class="flex items-center gap-2 cursor-pointer mx-1 sm:mx-2 group">
        <div class="relative flex items-center">
          <input type="checkbox" id="seam-mode-toggle" class="sr-only peer">
          <div class="w-10 h-5 bg-gray-300 dark:bg-gray-600 rounded-full peer-checked:bg-blue-500 transition-colors">
          </div>
          <div
            class="absolute left-0.5 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-5 shadow-sm">
          </div>
        </div>
        <span
          class="text-xs sm:text-sm text-gray-700 dark:text-gray-300 whitespace-nowrap select-none transition-colors group-hover:text-gray-900 dark:group-hover:text-white"
          id="seam-mode-text" data-i18n="indepCrop">独立裁切</span>
      </label>
      <button class="btn btn-primary" id="btn-seam-confirm" data-i18n="done">完成</button>
    </div>

    <div id="ui-step3-crop" class="floating-panel hidden">
      <button class="btn btn-secondary" id="btn-crop-prev" data-i18n="prevStep">上一步</button>
      <button class="btn btn-primary flex items-center gap-1 sm:gap-2" id="btn-crop-save">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        <span data-i18n="saveImage">保存图片</span>
      </button>
      <button class="btn btn-secondary hidden sm:block" id="btn-crop-restart" data-i18n="restart">重新开始</button>
    </div>
  </div>

  <div id="toast" class="toast">提示信息</div>

  <script type="module" src="./js/app.js"></script>
</body>

</html>
