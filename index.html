<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#121212">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>简单拼图</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      overscroll-behavior: none;
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
    }

    #main-canvas {
      touch-action: none;
      cursor: grab;
    }

    #main-canvas:active {
      cursor: grabbing;
    }

    .step-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      transition: opacity 0.3s ease;
    }

    .hidden-step {
      opacity: 0;
      pointer-events: none;
      z-index: -1;
    }

    .active-step {
      opacity: 1;
      pointer-events: auto;
      z-index: 10;
    }

    .thumbnail-container {
      position: relative;
      width: 120px;
      height: 160px;
      border-radius: 0.5rem;
      overflow: hidden;
      background: #f3f4f6;
      cursor: grab;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    @media (prefers-color-scheme: dark) {
      .thumbnail-container {
        background: #2a2a2a;
      }
    }

    .thumbnail-container:active {
      cursor: grabbing;
      transform: scale(0.95);
    }

    .thumbnail-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(239, 68, 68, 0.9);
      color: white;
      border-radius: 999px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }

    .delete-btn:hover {
      background: rgba(220, 38, 38, 1);
    }

    .drag-over {
      border: 2px dashed #3b82f6;
      opacity: 0.7;
    }

    .floating-panel {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      padding: 0.75rem 1.5rem;
      border-radius: 999px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      display: flex;
      gap: 1rem;
      align-items: center;
      border: 1px solid rgba(0, 0, 0, 0.1);
      color: #1f2937;
    }

    @media (prefers-color-scheme: dark) {
      .floating-panel {
        background: rgba(30, 30, 30, 0.85);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #ffffff;
      }
    }

    .btn {
      padding: 0.5rem 1.25rem;
      border-radius: 999px;
      font-weight: 500;
      font-size: 0.875rem;
      transition: all 0.2s;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-primary:disabled {
      background: #d1d5db;
      color: #9ca3af;
      cursor: not-allowed;
    }

    @media (prefers-color-scheme: dark) {
      .btn-primary:disabled {
        background: #374151;
      }
    }

    .btn-secondary {
      background: rgba(0, 0, 0, 0.05);
      color: inherit;
    }

    .btn-secondary:hover {
      background: rgba(0, 0, 0, 0.1);
    }

    @media (prefers-color-scheme: dark) {
      .btn-secondary {
        background: rgba(255, 255, 255, 0.1);
        color: white;
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.2);
      }
    }

    .toast {
      position: absolute;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.95);
      color: #1f2937;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    @media (prefers-color-scheme: dark) {
      .toast {
        background: rgba(0, 0, 0, 0.8);
        color: white;
        border: none;
      }
    }
  </style>
</head>

<body class="bg-gray-50 text-gray-900 dark:bg-[#121212] dark:text-white">
  <div id="step-1" class="step-container active-step p-4 sm:p-6 w-full h-full flex flex-col">
    <div class="text-center mb-4 sm:mb-6 shrink-0">
      <h1 class="text-2xl sm:text-3xl font-bold mb-2">简单拼图</h1>
      <p class="text-gray-500 dark:text-gray-400">添加多图，拖拽排序</p>
    </div>

    <div
      class="flex gap-4 mb-4 sm:mb-6 bg-white dark:bg-gray-800/50 p-2 rounded-full border border-gray-200 dark:border-gray-700 shrink-0 self-center">
      <label
        class="flex items-center gap-2 cursor-pointer px-4 py-2 rounded-full transition-colors hover:bg-gray-100 dark:hover:bg-gray-700">
        <input type="radio" name="direction" value="vertical" checked class="accent-blue-500">
        <span class="text-sm font-medium">纵向拼接</span>
      </label>
      <label
        class="flex items-center gap-2 cursor-pointer px-4 py-2 rounded-full transition-colors hover:bg-gray-100 dark:hover:bg-gray-700">
        <input type="radio" name="direction" value="horizontal" class="accent-blue-500">
        <span class="text-sm font-medium">横向拼接</span>
      </label>
    </div>

    <div
      class="w-full flex-grow bg-white dark:bg-gray-900 border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-2xl flex flex-col relative transition-colors min-h-0 overflow-hidden cursor-pointer"
      id="drop-zone">
      <input type="file" id="file-input" multiple accept="image/*" class="hidden">

      <div id="image-grid"
        class="w-full h-full overflow-y-auto p-4 sm:p-6 content-start grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-8 gap-4 hidden relative z-10">
      </div>

      <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-0">
        <svg class="w-16 h-16 text-gray-400 dark:text-gray-600 mb-4" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <p class="text-gray-500 dark:text-gray-400 text-sm">点击或拖拽图片到此处</p>
      </div>
    </div>

    <div class="mt-4 sm:mt-6 shrink-0 flex justify-center gap-4">
      <button id="btn-clear-all" class="btn btn-secondary px-8 py-3 text-lg opacity-50 cursor-not-allowed"
        disabled>清空</button>
      <button id="btn-next-1" class="btn btn-primary px-8 py-3 text-lg opacity-50 cursor-not-allowed"
        disabled>下一步</button>
    </div>
  </div>

  <div id="step-2-3" class="step-container hidden-step bg-gray-100 dark:bg-gray-950">
    <canvas id="main-canvas" class="w-full h-full block"></canvas>

    <div id="ui-step2-global" class="floating-panel hidden">
      <button class="btn btn-secondary" id="btn-global-prev">上一步</button>
      <span class="text-xs sm:text-sm text-gray-500 dark:text-gray-300 mx-1 sm:mx-2 whitespace-nowrap">点击接缝微调</span>
      <button class="btn btn-primary" id="btn-global-next">下一步</button>
    </div>

    <div id="ui-step2-seam" class="floating-panel hidden">
      <button class="btn btn-secondary" id="btn-seam-cancel">取消</button>
      <span class="text-xs sm:text-sm text-gray-500 dark:text-gray-300 mx-1 sm:mx-2 whitespace-nowrap">拖拽对齐</span>
      <button class="btn btn-primary" id="btn-seam-confirm">完成</button>
    </div>

    <div id="ui-step3-crop" class="floating-panel hidden">
      <button class="btn btn-secondary" id="btn-crop-prev">上一步</button>
      <button class="btn btn-secondary hidden sm:block" id="btn-crop-restart">重新开始</button>
      <button class="btn btn-primary flex items-center gap-1 sm:gap-2" id="btn-crop-save">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        保存图片
      </button>
    </div>
  </div>

  <div id="toast" class="toast">提示信息</div>

  <script>
    const UI_MODE = { STEP1: 'step1', STEP2_GLOBAL: 'step2_global', STEP2_SEAM: 'step2_seam', STEP3_CROP: 'step3_crop' };

    class PWAModule {
      constructor() {
        this.init();
      }
      init() {
        const mainUrl = location.href.split('?')[0].split('#')[0];
        const manifest = {
          name: "简单拼图", short_name: "简单拼图",
          description: "极简纯前端长图拼接应用，支持离线本地使用",
          start_url: mainUrl, display: "standalone",
          background_color: "#121212", theme_color: "#121212",
          icons: [{
            src: "data:image/svg+xml;charset=utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' fill='%23ffffff' rx='112'/%3E%3Crect x='128' y='128' width='256' height='256' fill='none' stroke='%23000000' stroke-width='32'/%3E%3Cpath d='M64 256h384' stroke='%23000000' stroke-width='32' stroke-linecap='round'/%3E%3C/svg%3E",
            sizes: "512x512", type: "image/svg+xml", purpose: "any maskable"
          }]
        };
        const manifestUrl = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' }));
        const link = document.createElement('link');
        link.rel = 'manifest'; link.href = manifestUrl;
        document.head.appendChild(link);

        if ('serviceWorker' in navigator) {
          const swCode = `
                        const CACHE_NAME = 'img-stitcher-v1';
                        const MAIN_URL = '${mainUrl}';
                        self.addEventListener('install', event => {
                            self.skipWaiting();
                            event.waitUntil(caches.open(CACHE_NAME).then(cache => cache.add(MAIN_URL)));
                        });
                        self.addEventListener('activate', event => event.waitUntil(self.clients.claim()));
                        self.addEventListener('fetch', event => {
                            if (event.request.method !== 'GET' || !event.request.url.startsWith('http')) return;
                            event.respondWith(
                                caches.match(event.request).then(cachedRes => {
                                    if (cachedRes) {
                                        fetch(event.request).then(netRes => {
                                            if (netRes && netRes.status === 200) caches.open(CACHE_NAME).then(cache => cache.put(event.request, netRes));
                                        }).catch(()=>{});
                                        return cachedRes;
                                    }
                                    return fetch(event.request).then(netRes => {
                                        if (netRes && netRes.status === 200) {
                                            const resClone = netRes.clone();
                                            caches.open(CACHE_NAME).then(cache => cache.put(event.request, resClone));
                                        }
                                        return netRes;
                                    }).catch(() => { if (event.request.mode === 'navigate') return caches.match(MAIN_URL); });
                                })
                            );
                        });
                    `;
          const swUrl = URL.createObjectURL(new Blob([swCode], { type: 'application/javascript' }));
          navigator.serviceWorker.register(swUrl).catch(err => console.log('SW Error:', err));
        }
      }
    }

    class StateModule {
      constructor() {
        this.mode = UI_MODE.STEP1;
        this.direction = 'vertical';
        this.images = [];
        this.overlaps = [];
        this.camera = { x: 0, y: 0, zoom: 1 };
        this.baseDimension = 0;
        this.totalBounds = { w: 0, h: 0 };
        this.activeSeamIndex = -1;
        this.tempOverlapDelta = 0;
        this.cropBox = { x: 0, y: 0, w: 0, h: 0 };
      }

      calculateBaseLayout() {
        if (this.images.length === 0) return;
        if (this.direction === 'vertical') {
          this.baseDimension = this.images[0].naturalW;
          this.images.forEach(img => {
            img.scale = this.baseDimension / img.naturalW;
            img.logicalW = this.baseDimension;
            img.logicalH = img.naturalH * img.scale;
          });
        } else {
          this.baseDimension = this.images[0].naturalH;
          this.images.forEach(img => {
            img.scale = this.baseDimension / img.naturalH;
            img.logicalH = this.baseDimension;
            img.logicalW = img.naturalW * img.scale;
          });
        }
      }

      updateLayoutPositions() {
        let currentPos = 0;
        let maxCross = this.baseDimension;
        for (let i = 0; i < this.images.length; i++) {
          const img = this.images[i];
          if (this.direction === 'vertical') {
            img.logicalX = 0; img.logicalY = currentPos;
            currentPos += img.logicalH;
          } else {
            img.logicalY = 0; img.logicalX = currentPos;
            currentPos += img.logicalW;
          }
          if (i < this.overlaps.length) currentPos -= this.overlaps[i];
        }
        this.totalBounds = {
          w: this.direction === 'vertical' ? maxCross : currentPos,
          h: this.direction === 'vertical' ? currentPos : maxCross
        };
      }
    }

    class ImageModule {
      constructor(app) {
        this.app = app;
        this.grid = document.getElementById('image-grid');
        this.emptyState = document.getElementById('empty-state');
        this.btnNext = document.getElementById('btn-next-1');
        this.btnClear = document.getElementById('btn-clear-all');
      }

      handleFiles(files) {
        const validFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
        if (validFiles.length === 0) return;

        let loadedCount = 0;
        validFiles.forEach(file => {
          const url = URL.createObjectURL(file);
          const img = new Image();
          img.onload = () => {
            this.app.state.images.push({
              id: Math.random().toString(36).substr(2, 9),
              file, url, imgEl: img,
              naturalW: img.naturalWidth, naturalH: img.naturalHeight
            });
            loadedCount++;
            if (loadedCount === validFiles.length) this.renderThumbnails();
          };
          img.src = url;
        });
      }

      removeImage(index) {
        URL.revokeObjectURL(this.app.state.images[index].url);
        this.app.state.images.splice(index, 1);
        this.renderThumbnails();
      }

      renderThumbnails() {
        this.grid.innerHTML = '';
        const images = this.app.state.images;

        if (images.length > 0) {
          this.grid.classList.remove('hidden');
          this.emptyState.classList.add('hidden');
        } else {
          this.grid.classList.add('hidden');
          this.emptyState.classList.remove('hidden');
        }

        images.forEach((imgObj, index) => {
          const div = document.createElement('div');
          div.className = 'thumbnail-container';
          div.draggable = true;
          div.dataset.index = index;

          div.innerHTML = `
                        <img src="${imgObj.url}" class="thumbnail-img">
                        <div class="delete-btn" title="删除">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </div>
                    `;

          div.querySelector('.delete-btn').onclick = (e) => { e.stopPropagation(); this.removeImage(index); };

          div.addEventListener('dragstart', e => {
            e.dataTransfer.setData('text/plain', div.dataset.index);
            setTimeout(() => div.style.opacity = '0.5', 0);
          });
          div.addEventListener('dragend', () => div.style.opacity = '1');
          div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
          div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
          div.addEventListener('drop', e => {
            e.preventDefault();
            e.stopPropagation();
            div.classList.remove('drag-over');

            const dragIndex = parseInt(e.dataTransfer.getData('text/plain'));
            const targetIndex = parseInt(div.dataset.index);

            if (dragIndex !== targetIndex && !isNaN(dragIndex) && !isNaN(targetIndex)) {
              const [draggedImg] = images.splice(dragIndex, 1);
              images.splice(targetIndex, 0, draggedImg);
              this.renderThumbnails();
            }
          });
          this.grid.appendChild(div);
        });

        const hasImages = images.length > 0;
        this.btnClear.disabled = !hasImages;
        this.btnClear.classList.toggle('opacity-50', !hasImages);
        this.btnClear.classList.toggle('cursor-not-allowed', !hasImages);

        const canProceed = images.length >= 2;
        this.btnNext.disabled = !canProceed;
        this.btnNext.classList.toggle('opacity-50', !canProceed);
        this.btnNext.classList.toggle('cursor-not-allowed', !canProceed);
      }
    }

    class RenderModule {
      constructor(app) {
        this.app = app;
        this.canvas = document.getElementById('main-canvas');
        this.ctx = this.canvas.getContext('2d');
      }

      resize() {
        const dpr = window.devicePixelRatio || 1;
        this.canvas.width = this.canvas.clientWidth * dpr;
        this.canvas.height = this.canvas.clientHeight * dpr;
      }

      drawGrid(w, h) {
        const ctx = this.ctx;
        const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

        ctx.fillStyle = isDark ? '#1e1e1e' : '#e5e7eb';
        ctx.fillRect(0, 0, w, h);

        const s = 40;
        ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.04)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let x = (w / 2) % s; x < w; x += s) { ctx.moveTo(x, 0); ctx.lineTo(x, h); }
        for (let y = (h / 2) % s; y < h; y += s) { ctx.moveTo(0, y); ctx.lineTo(w, y); }
        ctx.stroke();
      }

      renderClippedImages(ctxToDraw, customCropBox = null) {
        const state = this.app.state;
        state.images.forEach((img, i) => {
          let cropStart = i > 0 ? Math.max(0, state.overlaps[i - 1] / 2) : 0;
          let cropEnd = i < state.images.length - 1 ? Math.max(0, state.overlaps[i] / 2) : 0;

          let sx = 0, sy = 0, sw = img.naturalW, sh = img.naturalH;
          let dx = img.logicalX, dy = img.logicalY, dw = img.logicalW, dh = img.logicalH;

          if (state.direction === 'vertical') {
            sy = cropStart / img.scale;
            sh = (img.logicalH - cropStart - cropEnd) / img.scale;
            dy += cropStart; dh -= (cropStart + cropEnd);
          } else {
            sx = cropStart / img.scale;
            sw = (img.logicalW - cropStart - cropEnd) / img.scale;
            dx += cropStart; dw -= (cropStart + cropEnd);
          }

          if (sw <= 0 || sh <= 0 || dw <= 0 || dh <= 0) return;

          if (customCropBox) {
            if (dx + dw < customCropBox.x || dx > customCropBox.x + customCropBox.w) return;
            if (dy + dh < customCropBox.y || dy > customCropBox.y + customCropBox.h) return;
          }
          ctxToDraw.drawImage(img.imgEl, sx, sy, sw, sh, dx, dy, dw, dh);
        });
      }

      renderSeamsGlobal() {
        const ctx = this.ctx;
        const state = this.app.state;
        ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 3 / state.camera.zoom;
        ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 10 / state.camera.zoom;

        state.overlaps.forEach((overlap, i) => {
          const img = state.images[i];
          ctx.beginPath();
          if (state.direction === 'vertical') {
            const y = img.logicalY + img.logicalH - overlap / 2;
            ctx.moveTo(0, y); ctx.lineTo(state.baseDimension, y);
          } else {
            const x = img.logicalX + img.logicalW - overlap / 2;
            ctx.moveTo(x, 0); ctx.lineTo(x, state.baseDimension);
          }
          ctx.stroke();
        });
        ctx.shadowBlur = 0;
      }

      renderSeamAdjust() {
        const ctx = this.ctx;
        const state = this.app.state;
        const idx = state.activeSeamIndex;
        const img1 = state.images[idx];
        const img2 = state.images[idx + 1];
        const delta = state.tempOverlapDelta;
        const ds = this.app.gesture.dragState;

        let x1 = img1.logicalX, y1 = img1.logicalY;
        let x2 = img2.logicalX, y2 = img2.logicalY;

        if (state.direction === 'vertical') { y1 += delta / 2; y2 -= delta / 2; }
        else { x1 += delta / 2; x2 -= delta / 2; }

        const draggingImg1 = ds.activeImageIndex === idx && ds.active;
        if (draggingImg1) {
          ctx.globalAlpha = 1.0; ctx.drawImage(img2.imgEl, x2, y2, img2.logicalW, img2.logicalH);
          ctx.globalAlpha = 0.5; ctx.drawImage(img1.imgEl, x1, y1, img1.logicalW, img1.logicalH);
        } else {
          ctx.globalAlpha = 1.0; ctx.drawImage(img1.imgEl, x1, y1, img1.logicalW, img1.logicalH);
          ctx.globalAlpha = (ds.activeImageIndex === idx + 1 && ds.active) ? 0.5 : 1.0;
          ctx.drawImage(img2.imgEl, x2, y2, img2.logicalW, img2.logicalH);
        }
        ctx.globalAlpha = 1.0;

        ctx.strokeStyle = '#10b981'; ctx.setLineDash([5 / state.camera.zoom, 5 / state.camera.zoom]);
        ctx.lineWidth = 1.5 / state.camera.zoom; ctx.beginPath();
        if (state.direction === 'vertical') {
          const cy = img1.logicalY + img1.logicalH - state.overlaps[idx] / 2;
          ctx.moveTo(-1000, cy); ctx.lineTo(state.baseDimension + 1000, cy);
        } else {
          const cx = img1.logicalX + img1.logicalW - state.overlaps[idx] / 2;
          ctx.moveTo(cx, -1000); ctx.lineTo(cx, state.baseDimension + 1000);
        }
        ctx.stroke(); ctx.setLineDash([]);
      }

      renderCropBox() {
        const ctx = this.ctx;
        const state = this.app.state;
        const { x, y, w, h } = state.cropBox;

        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.beginPath();
        ctx.rect(-100000, -100000, 200000, 200000);
        ctx.rect(x + w, y, -w, h); ctx.fill('evenodd');

        ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2 / state.camera.zoom; ctx.strokeRect(x, y, w, h);
        ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1 / state.camera.zoom; ctx.beginPath();
        ctx.moveTo(x + w / 3, y); ctx.lineTo(x + w / 3, y + h);
        ctx.moveTo(x + 2 * w / 3, y); ctx.lineTo(x + 2 * w / 3, y + h);
        ctx.moveTo(x, y + h / 3); ctx.lineTo(x + w, y + h / 3);
        ctx.moveTo(x, y + 2 * h / 3); ctx.lineTo(x + w, y + 2 * h / 3);
        ctx.stroke();

        ctx.fillStyle = '#3b82f6'; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2 / state.camera.zoom;
        const hs = 8 / state.camera.zoom;
        const handles = [
          [x, y], [x + w / 2, y], [x + w, y], [x, y + h / 2], [x + w, y + h / 2],
          [x, y + h], [x + w / 2, y + h], [x + w, y + h]
        ];
        handles.forEach(([hx, hy]) => {
          ctx.beginPath(); ctx.arc(hx, hy, hs, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        });
      }

      renderFrame() {
        if (this.app.state.mode === UI_MODE.STEP1) return;
        const dpr = window.devicePixelRatio || 1;
        const cw = this.canvas.width; const ch = this.canvas.height;
        const cam = this.app.state.camera;

        this.ctx.setTransform(1, 0, 0, 1, 0, 0);
        this.ctx.clearRect(0, 0, cw, ch);
        this.drawGrid(cw, ch);

        this.ctx.setTransform(
          cam.zoom * dpr, 0, 0, cam.zoom * dpr,
          cw / 2 - cam.x * cam.zoom * dpr, ch / 2 - cam.y * cam.zoom * dpr
        );

        if (this.app.state.mode === UI_MODE.STEP2_GLOBAL) {
          this.renderClippedImages(this.ctx); this.renderSeamsGlobal();
        } else if (this.app.state.mode === UI_MODE.STEP2_SEAM) {
          this.renderSeamAdjust();
        } else if (this.app.state.mode === UI_MODE.STEP3_CROP) {
          this.renderClippedImages(this.ctx); this.renderCropBox();
        }
      }
    }

    class GestureModule {
      constructor(app) {
        this.app = app;
        this.pointers = new Map();
        this.isSpaceDown = false;
        this.dragState = { active: false, type: null, startX: 0, startY: 0, startCamX: 0, startCamY: 0, startCrop: null, activeImageIndex: -1, lastDist: 0, lastCenter: null };
        this.bindEvents();
      }

      screenToLogical(sx, sy) {
        const canvas = this.app.render.canvas;
        const cam = this.app.state.camera;
        const cx = canvas.clientWidth / 2; const cy = canvas.clientHeight / 2;
        return { x: ((sx - cx) / cam.zoom) + cam.x, y: ((sy - cy) / cam.zoom) + cam.y };
      }

      bindEvents() {
        const canvas = this.app.render.canvas;
        canvas.addEventListener('pointerdown', e => {
          canvas.setPointerCapture(e.pointerId);
          this.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
          if (this.pointers.size === 1) this.handleSingleDown(e);
          else if (this.pointers.size === 2) this.handleDoubleDown();
        });

        canvas.addEventListener('pointermove', e => {
          if (!this.pointers.has(e.pointerId)) return;
          this.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
          if (this.pointers.size === 1) this.handleSingleMove(e);
          else if (this.pointers.size === 2) this.handleDoubleMove();
        });

        const upHandler = e => {
          this.pointers.delete(e.pointerId);
          canvas.releasePointerCapture(e.pointerId);
          if (this.pointers.size === 0) {
            this.dragState.active = false; this.dragState.type = null;
          } else if (this.pointers.size === 1) {
            const pt = this.pointers.get(Array.from(this.pointers.keys())[0]);
            this.handleSingleDown({ clientX: pt.x, clientY: pt.y });
          }
        };
        canvas.addEventListener('pointerup', upHandler); canvas.addEventListener('pointercancel', upHandler);

        window.addEventListener('keydown', e => { if (e.code === 'Space') this.isSpaceDown = true; });
        window.addEventListener('keyup', e => { if (e.code === 'Space') this.isSpaceDown = false; });

        canvas.addEventListener('wheel', e => {
          if (this.app.state.mode === UI_MODE.STEP1) return;
          e.preventDefault();
          const pt = this.screenToLogical(e.clientX, e.clientY);
          const cam = this.app.state.camera;
          let newZoom = Math.max(0.05, Math.min(10, cam.zoom * Math.exp(-e.deltaY * 0.001)));
          cam.x = pt.x - (e.clientX - canvas.clientWidth / 2) / newZoom;
          cam.y = pt.y - (e.clientY - canvas.clientHeight / 2) / newZoom;
          cam.zoom = newZoom;
        }, { passive: false });
      }

      handleSingleDown(e) {
        const state = this.app.state;
        const logical = this.screenToLogical(e.clientX, e.clientY);
        this.dragState = {
          active: true, startX: e.clientX, startY: e.clientY,
          startLogicalX: logical.x, startLogicalY: logical.y,
          startCamX: state.camera.x, startCamY: state.camera.y,
          startCrop: { ...state.cropBox }
        };

        if (this.isSpaceDown) { this.dragState.type = 'pan'; return; }

        if (state.mode === UI_MODE.STEP2_GLOBAL) {
          const threshold = 20 / state.camera.zoom;
          for (let i = 0; i < state.overlaps.length; i++) {
            const img = state.images[i];
            let seamV = state.direction === 'vertical' ?
              img.logicalY + img.logicalH - state.overlaps[i] / 2 : img.logicalX + img.logicalW - state.overlaps[i] / 2;
            let hit = state.direction === 'vertical' ?
              (Math.abs(logical.y - seamV) < threshold && logical.x > 0 && logical.x < state.baseDimension) :
              (Math.abs(logical.x - seamV) < threshold && logical.y > 0 && logical.y < state.baseDimension);

            if (hit) return this.app.startSeamAdjust(i);
          }
          this.dragState.type = 'pan';
        }
        else if (state.mode === UI_MODE.STEP2_SEAM) {
          const img = state.images[state.activeSeamIndex];
          const seamVal = state.direction === 'vertical' ?
            img.logicalY + img.logicalH - state.overlaps[state.activeSeamIndex] / 2 : img.logicalX + img.logicalW - state.overlaps[state.activeSeamIndex] / 2;
          this.dragState.type = 'seam';
          const isFirst = state.direction === 'vertical' ? (logical.y < seamVal) : (logical.x < seamVal);
          this.dragState.activeImageIndex = isFirst ? state.activeSeamIndex : state.activeSeamIndex + 1;
        }
        else if (state.mode === UI_MODE.STEP3_CROP) {
          const hr = 15 / state.camera.zoom;
          const { x, y, w, h } = state.cropBox;
          const pts = [
            { type: 'crop_nw', px: x, py: y }, { type: 'crop_n', px: x + w / 2, py: y }, { type: 'crop_ne', px: x + w, py: y },
            { type: 'crop_w', px: x, py: y + h / 2 }, { type: 'crop_e', px: x + w, py: y + h / 2 },
            { type: 'crop_sw', px: x, py: y + h }, { type: 'crop_s', px: x + w / 2, py: y + h }, { type: 'crop_se', px: x + w, py: y + h }
          ];
          for (const p of pts) if (Math.hypot(logical.x - p.px, logical.y - p.py) < hr) return this.dragState.type = p.type;
          this.dragState.type = 'pan';
        }
      }

      handleSingleMove(e) {
        if (!this.dragState.active) return;
        const ds = this.dragState;
        const state = this.app.state;

        if (ds.type === 'pan') {
          state.camera.x = ds.startCamX - (e.clientX - ds.startX) / state.camera.zoom;
          state.camera.y = ds.startCamY - (e.clientY - ds.startY) / state.camera.zoom;
        } else if (ds.type === 'seam') {
          const logical = this.screenToLogical(e.clientX, e.clientY);
          const deltaLogic = state.direction === 'vertical' ? logical.y - ds.startLogicalY : logical.x - ds.startLogicalX;
          state.tempOverlapDelta = ds.activeImageIndex === state.activeSeamIndex ? deltaLogic * 2 : -deltaLogic * 2;
        } else if (ds.type && ds.type.startsWith('crop_')) {
          const logical = this.screenToLogical(e.clientX, e.clientY);
          const dx = logical.x - ds.startLogicalX; const dy = logical.y - ds.startLogicalY;
          let { x, y, w, h } = ds.startCrop;

          if (ds.type.includes('n')) { y += dy; h -= dy; }
          if (ds.type.includes('s')) { h += dy; }
          if (ds.type.includes('w')) { x += dx; w -= dx; }
          if (ds.type.includes('e')) { w += dx; }

          const minSize = 10 / state.camera.zoom;
          if (w < minSize) { w = minSize; x = state.cropBox.x; }
          if (h < minSize) { h = minSize; y = state.cropBox.y; }
          state.cropBox = { x, y, w, h };
        }
      }

      handleDoubleDown() {
        const pts = Array.from(this.pointers.values());
        this.dragState = {
          ...this.dragState, active: true, type: 'pan_zoom',
          lastCenter: { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 },
          lastDist: Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y),
          startCamX: this.app.state.camera.x, startCamY: this.app.state.camera.y
        };
      }

      handleDoubleMove() {
        if (this.dragState.type !== 'pan_zoom') return;
        const pts = Array.from(this.pointers.values());
        const center = { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
        const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
        const ds = this.dragState; const state = this.app.state;

        state.camera.x -= (center.x - ds.lastCenter.x) / state.camera.zoom;
        state.camera.y -= (center.y - ds.lastCenter.y) / state.camera.zoom;
        ds.lastCenter = center;

        if (ds.lastDist > 0) {
          const newZoom = Math.max(0.05, Math.min(10, state.camera.zoom * (dist / ds.lastDist)));
          const logicalCenter = this.screenToLogical(center.x, center.y);
          state.camera.zoom = newZoom;
          const newLogicalCenter = this.screenToLogical(center.x, center.y);
          state.camera.x -= (newLogicalCenter.x - logicalCenter.x);
          state.camera.y -= (newLogicalCenter.y - logicalCenter.y);
        }
        ds.lastDist = dist;
      }
    }

    class AppController {
      constructor() {
        this.state = new StateModule();
        this.pwa = new PWAModule();
        this.imageHandler = new ImageModule(this);
        this.render = new RenderModule(this);
        this.gesture = new GestureModule(this);

        this.bindUIEvents();
        this.loop = this.loop.bind(this);
        requestAnimationFrame(this.loop);

        window.addEventListener('resize', () => { this.render.resize(); this.fitCamera(); });
        window.addEventListener('offline', () => this.showToast("您已离线，应用可在离线模式下继续使用"));
        window.addEventListener('online', () => this.showToast("网络已恢复"));
      }

      showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg; toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
      }

      setUIMode(mode) {
        this.state.mode = mode;
        document.getElementById('step-1').className = mode === UI_MODE.STEP1 ? 'step-container active-step p-4 sm:p-6 w-full h-full flex flex-col' : 'step-container hidden-step';
        document.getElementById('step-2-3').className = mode !== UI_MODE.STEP1 ? 'step-container active-step bg-gray-100 dark:bg-gray-950' : 'step-container hidden-step';

        document.getElementById('ui-step2-global').classList.toggle('hidden', mode !== UI_MODE.STEP2_GLOBAL);
        document.getElementById('ui-step2-seam').classList.toggle('hidden', mode !== UI_MODE.STEP2_SEAM);
        document.getElementById('ui-step3-crop').classList.toggle('hidden', mode !== UI_MODE.STEP3_CROP);
        this.render.resize();
      }

      fitCamera() {
        const canvas = this.render.canvas;
        const pad = 40;
        const scaleX = (canvas.clientWidth - pad * 2) / this.state.totalBounds.w;
        const scaleY = (canvas.clientHeight - pad * 2) / this.state.totalBounds.h;
        this.state.camera.zoom = Math.max(0.05, Math.min(10, Math.min(scaleX, scaleY)));
        this.state.camera.x = this.state.totalBounds.w / 2;
        this.state.camera.y = this.state.totalBounds.h / 2;
      }

      startSeamAdjust(index) {
        this.state.activeSeamIndex = index;
        this.state.tempOverlapDelta = 0;
        this.setUIMode(UI_MODE.STEP2_SEAM);

        const img1 = this.state.images[index];
        const img2 = this.state.images[index + 1];
        let seamX, seamY, tZoom;
        const cw = this.render.canvas.clientWidth; const ch = this.render.canvas.clientHeight;

        if (this.state.direction === 'vertical') {
          seamX = this.state.baseDimension / 2;
          seamY = img1.logicalY + img1.logicalH - this.state.overlaps[index] / 2;
          tZoom = Math.min(cw / this.state.baseDimension, ch / (img1.logicalH + img2.logicalH) * 2);
        } else {
          seamY = this.state.baseDimension / 2;
          seamX = img1.logicalX + img1.logicalW - this.state.overlaps[index] / 2;
          tZoom = Math.min(ch / this.state.baseDimension, cw / (img1.logicalW + img2.logicalW) * 2);
        }
        this.state.camera.x = seamX; this.state.camera.y = seamY; this.state.camera.zoom = tZoom;
      }

      bindUIEvents() {
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('border-blue-500'); });
        dropZone.addEventListener('dragleave', e => { e.preventDefault(); dropZone.classList.remove('border-blue-500'); });
        dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('border-blue-500'); this.imageHandler.handleFiles(e.dataTransfer.files); });
        dropZone.addEventListener('click', e => {
          if (!e.target.closest('.thumbnail-container')) {
            fileInput.click();
          }
        });
        fileInput.addEventListener('change', e => this.imageHandler.handleFiles(e.target.files));

        document.getElementById('btn-clear-all').onclick = () => {
          this.state.images.forEach(img => URL.revokeObjectURL(img.url));
          this.state.images = [];
          this.imageHandler.renderThumbnails();
          fileInput.value = '';
        };

        document.getElementById('btn-next-1').onclick = () => {
          this.state.direction = Array.from(document.getElementsByName('direction')).find(r => r.checked).value;
          this.state.calculateBaseLayout();
          if (this.state.overlaps.length !== this.state.images.length - 1) this.state.overlaps = new Array(this.state.images.length - 1).fill(0);
          this.state.updateLayoutPositions(); this.fitCamera();
          this.setUIMode(UI_MODE.STEP2_GLOBAL);
        };

        document.getElementById('btn-global-prev').onclick = () => this.setUIMode(UI_MODE.STEP1);
        document.getElementById('btn-global-next').onclick = () => {
          this.state.updateLayoutPositions();
          this.state.cropBox = { x: 0, y: 0, w: this.state.totalBounds.w, h: this.state.totalBounds.h };
          this.fitCamera(); this.setUIMode(UI_MODE.STEP3_CROP);
        };

        document.getElementById('btn-seam-cancel').onclick = () => {
          this.state.tempOverlapDelta = 0;
          this.state.updateLayoutPositions(); this.fitCamera(); this.setUIMode(UI_MODE.STEP2_GLOBAL);
        };
        document.getElementById('btn-seam-confirm').onclick = () => {
          this.state.overlaps[this.state.activeSeamIndex] += this.state.tempOverlapDelta;
          this.state.tempOverlapDelta = 0;
          this.state.updateLayoutPositions(); this.fitCamera(); this.setUIMode(UI_MODE.STEP2_GLOBAL);
        };

        document.getElementById('btn-crop-prev').onclick = () => { this.state.updateLayoutPositions(); this.fitCamera(); this.setUIMode(UI_MODE.STEP2_GLOBAL); };
        document.getElementById('btn-crop-restart').onclick = () => this.setUIMode(UI_MODE.STEP1);
        document.getElementById('btn-crop-save').onclick = async () => {
          this.showToast("正在生成图片...");
          await new Promise(r => setTimeout(r, 50));

          const exportCanvas = document.createElement('canvas');
          let outW = this.state.cropBox.w; let outH = this.state.cropBox.h;

          const maxDim = 16384; let scale = 1;
          if (outW > maxDim || outH > maxDim) {
            scale = maxDim / Math.max(outW, outH);
            outW *= scale; outH *= scale;
            this.showToast("图片过大，已自动缩放以防崩溃");
          }

          exportCanvas.width = outW; exportCanvas.height = outH;
          const eCtx = exportCanvas.getContext('2d');

          eCtx.imageSmoothingEnabled = true;
          eCtx.imageSmoothingQuality = 'high';

          eCtx.scale(scale, scale); eCtx.translate(-this.state.cropBox.x, -this.state.cropBox.y);

          this.render.renderClippedImages(eCtx, this.state.cropBox);

          exportCanvas.toBlob(blob => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `stitched_image_${Date.now()}.png`; a.click();
            URL.revokeObjectURL(url); this.showToast("下载完成");
          }, 'image/png', 1.0);
        };
      }

      loop() {
        requestAnimationFrame(this.loop);
        this.render.renderFrame();
      }
    }

    const app = new AppController();
  </script>
</body>

</html>
